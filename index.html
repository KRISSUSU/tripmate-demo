<!DOCTYPE html><html lang="zh-CN"><head>
<base href="/s/tripmate-demo/"/>
<script>
(function(){
  if(window.__FAAS_PATCHED)return;
  window.__FAAS_PATCHED=true;
  var P="/s/tripmate-demo";
  function rewrite(url){
    if(typeof url!=='string'||url.length===0)return url;
    if(url.charAt(0)!=='/')return url;                            // 相对 / absolute URL — 不动
    if(url.length>1&&url.charAt(1)==='/')return url;               // 协议相对 //host/...
    // 已带前缀：严格判等 P 或 P+"/" 起手，避免 sibling app_id（如 P="/s/abc"
    // url="/s/abcdef/..."）被 startsWith 误判为已前缀
    if(url===P||url.indexOf(P+'/')===0)return url;
    return P+url;
  }
  // ── webpack 动态 chunk public path ──
  // Next.js / Vue CLI / CRA / 任何 webpack 产物，runtime 加载懒加载 chunk 时
  // 走 __webpack_require__.p（在 build 阶段烧成 publicPath 配置值，默认 "/_next/" 或 "/"）。
  // 这里在所有 chunk 加载之前覆盖成带 prefix 的版本，让动态 import 走对的 URL。
  // 多个全局名都覆盖一遍（webpack4 / webpack5 / 各框架 wrapper 用名不同）。
  try {
    window.__webpack_public_path__ = P + "/_next/";
    // eslint-disable-next-line no-undef
    if (typeof __webpack_public_path__ !== 'undefined') __webpack_public_path__ = P + "/_next/";
  } catch(e){}
  // patch fetch
  var _fetch=window.fetch;
  window.fetch=function(input,init){
    if(typeof input==='string')input=rewrite(input);
    else if(input instanceof Request)input=new Request(rewrite(input.url),input);
    return _fetch.call(this,input,init);
  };
  // patch XHR
  var _open=XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open=function(method,url){
    arguments[1]=rewrite(url);
    return _open.apply(this,arguments);
  };
  // ── history API：客户端路由（Next.js Link / Vue Router / React Router）──
  // 这些路由库内部把组件 props 里的裸 path（"/foo"）直接传给 history.pushState/
  // replaceState，pushState 不带 prefix 会让 URL bar 跳到 /foo（丢前缀）→ 刷新 404。
  // 这里 patch：传入绝对路径且未带前缀时自动补上。state 与 title 透传。
  // popstate（浏览器后退/前进）由浏览器原生触发，URL 已带 prefix，路由库内部读
  // location.pathname 时拿到带前缀的 path —— 这种边界场景由路由库自己处理；
  // 大多数库（含 Next.js App Router）能容忍前缀作为额外 segment。
  function patchHistory(name){
    var orig = history[name];
    history[name] = function(state, title, url){
      if (typeof url === 'string') url = rewrite(url);
      return orig.call(this, state, title, url);
    };
  }
  patchHistory('pushState');
  patchHistory('replaceState');
  // ── window.location.assign / replace：SPA 路由库的 fallback 整页跳转走这里 ──
  // Next.js App Router 在客户端 RSC fetch / hydration 失败时回退到
  // location.assign(原始 react-prop href)，原始 href 是裸路径（如 "/env"），
  // 不经过上面的 pushState patch → URL bar 跳到裸路径 → router 拒收（no
  // route prefix matched）。这里包一下让 fallback 跳转也带上前缀。
  // location.href setter 在现代浏览器 [LegacyUnforgeable] 不可 override；
  // subapp 自己别写 `location.href = "/foo"`（prompt § 七.5 写法规则已约束）。
  function patchLocation(name){
    var orig = location[name];
    if (typeof orig !== 'function') return;
    location[name] = function(url){
      if (typeof url === 'string') url = rewrite(url);
      return orig.call(location, url);
    };
  }
  patchLocation('assign');
  patchLocation('replace');
  // WebSocket：spec 要求 ws://... 或 wss://... 绝对 URL。subapp 写
  // new WebSocket("/foo") 浏览器直接拒；这里把 "/foo" 升级成 wss://host/<prefix>/foo
  // （host / 协议跟当前页走），subapp 完全不用读 baseURI 自己拼。
  if (window.WebSocket) {
    var origWS = window.WebSocket;
    function PatchedWS(url, protocols){
      if (typeof url === 'string' && url.charAt(0) === '/' && url.charAt(1) !== '/') {
        if (url.indexOf(P + '/') !== 0 && url !== P) url = P + url;
        var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        url = proto + '//' + location.host + url;
      }
      return protocols === undefined ? new origWS(url) : new origWS(url, protocols);
    }
    PatchedWS.prototype = origWS.prototype;
    PatchedWS.CONNECTING = origWS.CONNECTING; PatchedWS.OPEN = origWS.OPEN;
    PatchedWS.CLOSING = origWS.CLOSING;       PatchedWS.CLOSED = origWS.CLOSED;
    window.WebSocket = PatchedWS;
  }
  // EventSource：spec 接受 path，但 path 是绝对就丢前缀。包一层 rewrite。
  if (window.EventSource) {
    var origES = window.EventSource;
    function PatchedES(url, init){
      if (typeof url === 'string') url = rewrite(url);
      return init === undefined ? new origES(url) : new origES(url, init);
    }
    PatchedES.prototype = origES.prototype;
    PatchedES.CONNECTING = origES.CONNECTING; PatchedES.OPEN = origES.OPEN;
    PatchedES.CLOSED = origES.CLOSED;
    window.EventSource = PatchedES;
  }
  // ServiceWorker.register(scriptURL, {scope})：subapp 写 register("/sw.js")
  // 会注册到 host root，scope 默认也走根，跨 prefix 失效。URL + scope 都包。
  if (navigator.serviceWorker) {
    var sw = navigator.serviceWorker;
    if (typeof sw.register === 'function') {
      var origReg = sw.register.bind(sw);
      sw.register = function(scriptURL, options) {
        if (typeof scriptURL === 'string') scriptURL = rewrite(scriptURL);
        if (options && typeof options.scope === 'string') {
          // ES5-safe shallow clone
          var newOpts = {};
          for (var k in options) {
            if (Object.prototype.hasOwnProperty.call(options, k)) newOpts[k] = options[k];
          }
          newOpts.scope = rewrite(options.scope);
          options = newOpts;
        }
        return origReg(scriptURL, options);
      };
    }
    if (typeof sw.getRegistration === 'function') {
      var origGet = sw.getRegistration.bind(sw);
      sw.getRegistration = function(scope) {
        if (typeof scope === 'string') scope = rewrite(scope);
        return origGet(scope);
      };
    }
  }
  // patch DOM: rewrite absolute paths in href/action/src attributes
  var SEL='a[href],form[action],link[href],script[src],img[src],video[src],audio[src],source[src],source[srcset],img[srcset],video[poster]';
  function getUrlAttr(el){
    if(el.hasAttribute('action'))return 'action';
    if(el.hasAttribute('src'))return 'src';
    if(el.hasAttribute('poster'))return 'poster';
    return 'href';
  }
  function patchEl(el){
    var attr=getUrlAttr(el);
    var v=el.getAttribute(attr);
    // 跟 rewrite() 用同一套判定，避免重复实现：协议相对、相对路径、已带前缀（严格 P 或 P+/）都不动
    if(v){
      var nv=rewrite(v);
      if(nv!==v)el.setAttribute(attr,nv);
    }
    // srcset 需要单独处理（多 URL 格式）
    var ss=el.getAttribute('srcset');
    if(ss&&ss.indexOf('/')===0){
      el.setAttribute('srcset',ss.replace(/(^|,\s*)(\/[^\/])/g,'$1'+P+'$2'));
    }
    // 内联 style 里的 url()：HTML body filter 兜静态部分；这里兜动态插入的
    // （React render 出 <div style={{background:'url(/x)'}}>）
    var style=el.getAttribute('style');
    if(style&&style.indexOf('url(')!==-1&&style.indexOf('/')!==-1){
      var newStyle=style.replace(/(url\(\s*['"]?)(\/[^\/])/g,'$1'+P+'$2');
      // 双前缀防御：已带 P 的 url 被加成 P+P → 折回 P
      newStyle=newStyle.split(P+P).join(P);
      if(newStyle!==style)el.setAttribute('style',newStyle);
    }
  }
  function patchDOM(){document.querySelectorAll(SEL).forEach(patchEl);}
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',patchDOM);
  }else{
    patchDOM();
  }
  new MutationObserver(function(mutations){
    mutations.forEach(function(m){
      m.addedNodes.forEach(function(n){
        if(n.nodeType!==1)return;
        if(n.matches&&n.matches(SEL))patchEl(n);
        if(n.querySelectorAll)n.querySelectorAll(SEL).forEach(patchEl);
      });
    });
  }).observe(document.documentElement,{childList:true,subtree:true});
})();
</script>

// ========== STATE ==========
let currentData = null;
let editTarget  = null; // { dayIdx, itemIdx }

// ========== HELPERS ==========
function toggleTag(el) {
  el.classList.toggle('tag-active');
  el.classList.toggle('tag-default');
}
function quickSearch(dest) {
  document.getElementById('dest-input').value = dest;
  startPlan();
}
function typeColor(type) {
  return { spot:'bg-[#E8EDC7] text-[#6B8C2A]', food:'bg-[#FFF3D0] text-[#B8860B]', hotel:'bg-[#EAF1FF] text-[#2255AA]' }[type] || 'bg-[#F0EBE0] text-[#5A5A5A]';
}
function showToast(msg='✅ 已保存修改') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ========== LOADING ==========
const loadingMessages = ['AI 正在抓取小红书笔记...','分析 47 篇高赞攻略...','提取景点、美食、住宿信息...','生成个性化行程规划...','即将完成，稍等一下...'];
function startPlan() {
  const input = document.getElementById('dest-input').value.trim() || '大理';
  const dest  = DATA[input] ? input : '大理';
  currentData = JSON.parse(JSON.stringify(DATA[dest]));

  document.getElementById('hero').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('loading').classList.remove('hidden');

  let i = 0;
  const el = document.getElementById('loading-text');
  const iv = setInterval(() => { el.textContent = loadingMessages[++i % loadingMessages.length]; }, 800);

  setTimeout(() => {
    clearInterval(iv);
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('result-title').textContent = `🗺 ${dest} ${currentData.days.length}天${currentData.days.length-1}夜行程规划`;
    renderAll();
    document.getElementById('result').classList.remove('hidden');
    switchTab('itinerary', document.querySelector('[onclick^="switchTab(\'itinerary\'"]'));
  }, 3200);
}

function renderAll() {
  renderDays();
  renderFlowChart();
  renderBudget();
  renderNotesSidebar();
  renderNotesGrid();
  renderHotels();
  renderFoods();
  renderSpots();
}

// ========== DAYS ==========
function renderDays() {
  const container = document.getElementById('days-container');
  container.innerHTML = currentData.days.map((d, di) => `
    <div class="bg-white rounded-2xl border border-[#E5E5E5] overflow-hidden fade-in" style="animation-delay:${di*.07}s">
      <div class="flex items-center justify-between px-5 py-3.5 border-b border-[#F0EBE0]">
        <div class="flex items-center gap-3">
          <span class="w-8 h-8 rounded-full bg-[#B5C96B] text-[#2D2D2D] text-sm font-bold flex items-center justify-center">${d.day}</span>
          <input value="${d.title}" onchange="updateDayTitle(${di},this.value)"
            class="font-semibold text-base bg-transparent outline-none border-b-2 border-transparent focus:border-[#B5C96B] transition-colors w-48 md:w-72" />
        </div>
        <div class="flex gap-2">
          <button onclick="addItem(${di})" title="添加项目"
            class="text-xs bg-[#E8EDC7] text-[#6B8C2A] px-3 py-1 rounded-full hover:bg-[#B5C96B] transition-all font-medium">＋ 添加</button>
          <button onclick="removeDay(${di})" title="删除这天"
            class="text-xs bg-[#FFF0F0] text-[#E53935] px-3 py-1 rounded-full hover:bg-[#FFDDDD] transition-all font-medium">✕</button>
        </div>
      </div>
      <div class="p-4 pl-5">
        <div class="day-line pl-4 space-y-3" id="items-${di}">
          ${d.items.map((item,ii) => itemHTML(di,ii,item)).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function itemHTML(di, ii, item) {
  return `
    <div class="item-row relative p-2 -ml-2 group" id="item-${di}-${ii}">
      <div class="absolute -left-[21px] top-3 w-3 h-3 rounded-full day-dot border-2 border-white"></div>
      <div class="flex items-start gap-2">
        <!-- time (inline edit) -->
        <input value="${item.time}" onchange="updateField(${di},${ii},'time',this.value)"
          class="editable-field text-xs text-[#8A8A8A] w-12 shrink-0 pt-0.5 cursor-text" title="点击修改时间" />
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <!-- name (inline edit) -->
            <span class="text-sm">${item.icon}</span>
            <input value="${item.name}" onchange="updateField(${di},${ii},'name',this.value)"
              class="editable-field font-semibold text-sm cursor-text flex-1 min-w-0" title="点击修改名称" />
            <span class="text-xs px-2 py-0.5 rounded-full ${typeColor(item.type)}">${item.price}</span>
            ${item.duration ? `<span class="text-xs text-[#8A8A8A]">⏱${item.duration}</span>` : ''}
          </div>
          <!-- desc (inline edit) -->
          <input value="${item.desc}" onchange="updateField(${di},${ii},'desc',this.value)"
            class="editable-field text-xs text-[#5A5A5A] mt-0.5 cursor-text" title="点击修改描述" />
        </div>
        <!-- action btns -->
        <div class="edit-btn flex gap-1 shrink-0 pt-0.5">
          <button onclick="openModal(${di},${ii})" title="详细编辑"
            class="text-xs bg-[#E8EDC7] text-[#6B8C2A] w-7 h-7 rounded-full hover:bg-[#B5C96B] flex items-center justify-center transition-all">✏️</button>
          <button onclick="moveItem(${di},${ii},-1)" title="上移"
            class="text-xs bg-[#F0EBE0] text-[#5A5A5A] w-7 h-7 rounded-full hover:bg-[#E5DDD0] flex items-center justify-center transition-all">↑</button>
          <button onclick="moveItem(${di},${ii},1)" title="下移"
            class="text-xs bg-[#F0EBE0] text-[#5A5A5A] w-7 h-7 rounded-full hover:bg-[#E5DDD0] flex items-center justify-center transition-all">↓</button>
        </div>
      </div>
    </div>`;
}

function updateField(di, ii, field, val) {
  currentData.days[di].items[ii][field] = val;
  renderFlowChart();
  showToast('✅ 已保存修改');
}
function updateDayTitle(di, val) {
  currentData.days[di].title = val;
  renderFlowChart();
}
function moveItem(di, ii, dir) {
  const items = currentData.days[di].items;
  const ni = ii + dir;
  if (ni < 0 || ni >= items.length) return;
  [items[ii], items[ni]] = [items[ni], items[ii]];
  renderDays(); renderFlowChart();
  showToast('↕️ 顺序已更新');
}
function removeDay(di) {
  if (currentData.days.length <= 1) { showToast('⚠️ 至少保留一天'); return; }
  currentData.days.splice(di,1);
  currentData.days.forEach((d,i)=>d.day=i+1);
  renderDays(); renderFlowChart(); renderBudget();
  showToast('🗑 已删除该天');
}
function addDay() {
  const last = currentData.days[currentData.days.length-1];
  currentData.days.push({ day: last.day+1, title:`第${last.day+1}天`, items:[
    { time:'09:00', type:'spot', icon:'📍', name:'新景点', desc:'点击编辑这里的内容', duration:'2h', price:'待定' }
  ]});
  renderDays(); renderFlowChart(); renderBudget();
  showToast('✅ 已添加新的一天');
}
function addItem(di) {
  currentData.days[di].items.push({ time:'00:00', type:'spot', icon:'📍', name:'新项目', desc:'点击编辑内容', duration:'1h', price:'待定' });
  renderDays(); renderFlowChart();
  showToast('✅ 已添加新项目');
}

// ========== MODAL ==========
let modalType = 'spot';
function openModal(di, ii) {
  editTarget = { di, ii };
  const item = currentData.days[di].items[ii];
  document.getElementById('m-time').value     = item.time;
  document.getElementById('m-name').value     = item.name;
  document.getElementById('m-desc').value     = item.desc;
  document.getElementById('m-price').value    = item.price;
  document.getElementById('m-duration').value = item.duration;
  setModalType(item.type);
  document.getElementById('edit-modal').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('edit-modal').classList.add('hidden');
  editTarget = null;
}
function setModalType(type) {
  modalType = type;
  document.querySelectorAll('.type-btn').forEach(btn => {
    const t = btn.dataset.type;
    btn.className = `type-btn flex-1 text-xs px-3 py-2 rounded-xl border font-medium transition-all ${t===type ? 'border-[#B5C96B] ring-2 ring-[#B5C96B]/30 flow-'+t : 'border-[#E5E5E5] bg-[#FAF7F2] text-[#5A5A5A]'}`;
  });
}
function saveModal() {
  if (!editTarget) return;
  const { di, ii } = editTarget;
  const item = currentData.days[di].items[ii];
  item.time     = document.getElementById('m-time').value;
  item.name     = document.getElementById('m-name').value;
  item.desc     = document.getElementById('m-desc').value;
  item.price    = document.getElementById('m-price').value;
  item.duration = document.getElementById('m-duration').value;
  item.type     = modalType;
  closeModal();
  renderDays(); renderFlowChart();
  showToast('✅ 已保存修改');
}
function deleteItem() {
  if (!editTarget) return;
  const { di, ii } = editTarget;
  currentData.days[di].items.splice(ii,1);
  closeModal();
  renderDays(); renderFlowChart();
  showToast('🗑 已删除该项目');
}
document.getElementById('edit-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('edit-modal')) closeModal();
});

// ========== FLOW CHART ==========
function flowClass(type) {
  return { spot:'flow-spot', food:'flow-food', hotel:'flow-hotel' }[type] || 'flow-transport';
}
function renderFlowChart() {
  const chart = document.getElementById('flow-chart');
  chart.innerHTML = currentData.days.map((d, di) => {
    const itemsHTML = d.items.map(item => `
      <div class="flow-item ${flowClass(item.type)} px-2 py-1.5 mb-1.5 flex items-start gap-1.5 cursor-pointer hover:opacity-80 transition-opacity"
           onclick="openModal(${di},${d.items.indexOf(item)})" title="点击编辑">
        <span class="text-xs shrink-0">${item.icon}</span>
        <div class="min-w-0">
          <div class="font-semibold leading-tight text-[11px] truncate">${item.name}</div>
          <div class="text-[10px] opacity-70 mt-0.5">${item.time} · ${item.price}</div>
        </div>
      </div>`).join('');
    return `
      <div class="flex items-start gap-0">
        <div class="flow-day shrink-0">
          <div class="text-center mb-2">
            <div class="w-9 h-9 rounded-full bg-[#B5C96B] text-[#2D2D2D] text-sm font-bold flex items-center justify-center mx-auto mb-1">D${d.day}</div>
            <div class="text-[11px] font-semibold text-[#2D2D2D] leading-tight px-1 text-center" style="max-width:130px">${d.title}</div>
          </div>
          <div class="px-1">${itemsHTML}</div>
        </div>
        ${di < currentData.days.length-1 ? `<div class="flow-arrow pt-4 px-1 shrink-0">→</div>` : ''}
      </div>`;
  }).join('');
}

// ========== BUDGET ==========
function renderBudget() {
  const allItems = currentData.days.flatMap(d => d.items);
  const byType = { spot:[], food:[], hotel:[] };
  allItems.forEach(i => { if (byType[i.type]) byType[i.type].push(i.price); });
  const cards = [
    { label:'🏛 景区门票', items:byType.spot,  bg:'bg-[#E8EDC7]', text:'text-[#4A6B1A]' },
    { label:'🍜 餐饮美食', items:byType.food,  bg:'bg-[#FFF3D0]', text:'text-[#9B6A00]' },
    { label:'🏨 住宿费用', items:byType.hotel, bg:'bg-[#EAF1FF]', text:'text-[#2255AA]' },
    { label:'💰 预计总计', items:[], bg:'bg-[#2D2D2D]', text:'text-white', total:true },
  ];
  document.getElementById('budget-summary').innerHTML = cards.map(c => `
    <div class="${c.bg} rounded-2xl p-4">
      <div class="${c.text} text-xs font-semibold mb-2">${c.label}</div>
      ${c.total
        ? `<div class="text-white text-lg font-bold">¥3500-5000</div><div class="text-white/60 text-xs mt-1">预估/人</div>`
        : `<div class="${c.text} text-sm font-bold">${c.items.length} 项</div>
           <div class="${c.text} opacity-70 text-xs mt-1 truncate">${c.items.slice(0,2).join(' · ') || '暂无'}</div>`}
    </div>`).join('');
}

// ========== SCROLL TO FLOW ==========
function scrollToFlowChart() {
  document.getElementById('flow-chart-section').scrollIntoView({ behavior:'smooth', block:'start' });
}

// ========== COPY ==========
function copyItinerary() {
  const text = currentData.days.map(d =>
    `【Day${d.day}·${d.title}】\n` +
    d.items.map(i => `${i.time} ${i.icon}${i.name} - ${i.desc} (${i.price})`).join('\n')
  ).join('\n\n');
  navigator.clipboard.writeText(text).then(() => showToast('📋 行程已复制到剪贴板'));
}

// ========== NOTES ==========
function renderNotesSidebar() {
  document.getElementById('notes-sidebar').innerHTML = currentData.notes.map((n,i) => `
    <div class="bg-white rounded-xl border border-[#E5E5E5] overflow-hidden note-card-hover cursor-pointer fade-in" style="animation-delay:${i*.07}s">
      <div class="flex gap-3 p-3">
        <img src="${n.cover}" class="w-16 h-16 object-cover rounded-lg shrink-0" />
        <div class="flex-1 min-w-0">
          <p class="text-xs font-semibold line-clamp-2 leading-snug mb-1">${n.title}</p>
          <p class="text-xs text-[#8A8A8A]">${n.author}</p>
          <div class="flex items-center gap-1 mt-1">
            <span class="text-xs text-[#EA4C8F]">❤️</span>
            <span class="text-xs text-[#8A8A8A]">${n.likes}</span>
          </div>
        </div>
      </div>
    </div>`).join('');
}
function renderNotesGrid() {
  const all = [...currentData.notes, ...currentData.notes.map(n=>({...n,id:n.id+10,cover:n.cover.replace(/seed\/\w+/,`seed/nx${n.id}`)}))];
  document.getElementById('notes-grid').innerHTML = all.map((n,i) => `
    <div class="break-inside-avoid mb-4 bg-white rounded-2xl overflow-hidden note-card-hover cursor-pointer border border-[#E5E5E5]">
      <img src="${n.cover}" class="w-full object-cover" style="height:${160+((i*37)%120)}px" />
      <div class="p-3">
        <p class="text-xs font-semibold leading-snug mb-2">${n.title}</p>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-1.5">
            <div class="w-5 h-5 rounded-full bg-[#B5C96B] text-white text-xs flex items-center justify-center">${n.author[0]}</div>
            <span class="text-xs text-[#8A8A8A]">${n.author}</span>
          </div>
          <div class="flex items-center gap-1">
            <span class="text-xs text-[#EA4C8F]">❤️</span>
            <span class="text-xs text-[#8A8A8A]">${n.likes}</span>
          </div>
        </div>
      </div>
    </div>`).join('');
}

// ========== HOTELS / FOODS / SPOTS ==========
function renderHotels() {
  document.getElementById('hotel-grid').innerHTML = currentData.hotels.map((h,i) => `
    <div class="bg-white rounded-2xl border border-[#E5E5E5] overflow-hidden card-hover cursor-pointer fade-in" style="animation-delay:${i*.08}s">
      <img src="${h.img}" class="w-full h-44 object-cover" />
      <div class="p-4">
        <div class="flex items-start justify-between gap-2 mb-2">
          <div><p class="font-semibold text-sm">${h.name}</p><p class="text-xs text-[#8A8A8A]">${h.type} · ${h.location}</p></div>
          <div class="text-right shrink-0"><p class="font-bold text-[#B5C96B]">${h.price}</p><p class="text-xs text-[#8A8A8A]">⭐${h.rating}</p></div>
        </div>
        <div class="flex flex-wrap gap-1.5">${h.tags.map(t=>`<span class="text-xs bg-[#E8EDC7] text-[#6B8C2A] px-2 py-0.5 rounded-full">${t}</span>`).join('')}</div>
        <button class="btn-primary w-full mt-3 py-2 rounded-xl text-sm font-semibold">查看详情</button>
      </div>
    </div>`).join('');
}
function renderFoods() {
  document.getElementById('food-grid').innerHTML = currentData.foods.map((f,i) => `
    <div class="bg-white rounded-2xl border border-[#E5E5E5] overflow-hidden card-hover cursor-pointer fade-in" style="animation-delay:${i*.08}s">
      <img src="${f.img}" class="w-full h-44 object-cover" />
      <div class="p-4">
        <div class="flex items-center justify-between mb-1"><p class="font-semibold text-sm">${f.name}</p><span class="font-bold text-[#B5C96B] text-sm">${f.price}</span></div>
        <p class="text-xs text-[#5A5A5A] mb-2">${f.desc}</p>
        <p class="text-xs text-[#8A8A8A] mb-2">📍${f.location}</p>
        <div class="flex flex-wrap gap-1.5">${f.tags.map(t=>`<span class="text-xs bg-[#FFF3D0] text-[#B8860B] px-2 py-0.5 rounded-full">${t}</span>`).join('')}</div>
      </div>
    </div>`).join('');
}
function renderSpots() {
  document.getElementById('spot-grid').innerHTML = currentData.spots.map((s,i) => `
    <div class="bg-white rounded-2xl border border-[#E5E5E5] overflow-hidden card-hover cursor-pointer fade-in" style="animation-delay:${i*.08}s">
      <div class="relative">
        <img src="${s.img}" class="w-full h-44 object-cover" />
        <span class="absolute top-3 left-3 bg-white/90 text-xs font-semibold px-3 py-1 rounded-full">${s.type}</span>
        <span class="absolute top-3 right-3 bg-[#B5C96B] text-xs font-semibold px-3 py-1 rounded-full">⭐${s.rating}</span>
      </div>
      <div class="p-4">
        <div class="flex items-start justify-between mb-1"><p class="font-semibold text-sm">${s.name}</p><span class="text-sm text-[#B5C96B] font-bold">${s.price}</span></div>
        <p class="text-xs text-[#5A5A5A] mb-2">${s.desc}</p>
        <p class="text-xs text-[#8A8A8A] mb-2">⏱建议游览${s.duration}</p>
        <div class="flex flex-wrap gap-1.5">${s.tags.map(t=>`<span class="text-xs bg-[#E8EDC7] text-[#6B8C2A] px-2 py-0.5 rounded-full">${t}</span>`).join('')}</div>
      </div>
    </div>`).join('');
}

// ========== TABS ==========
function switchTab(tab, el) {
  ['itinerary','notes','hotel','food','spot'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
  document.getElementById('tab-'+tab).classList.remove('hidden');
  document.querySelectorAll('[onclick^="switchTab"]').forEach(b => { b.classList.remove('tab-active'); b.classList.add('tab-default'); });
  if (el) { el.classList.remove('tab-default'); el.classList.add('tab-active'); }
}
</script>
