<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅行家 TripMate · AI 旅游规划助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', -apple-system, sans-serif; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }

    /* ── Light Mode ── */
    :root {
      --bg: #FAF7F2; --bg2: #F0EBE0; --bg3: #E8EDC7;
      --card: #ffffff; --border: #E5E5E5;
      --text: #2D2D2D; --text2: #5A5A5A; --text3: #8A8A8A;
      --primary: #B5C96B; --primary-dark: #9BAF5C;
      --shimmer1: #f0ebe0; --shimmer2: #e8e3d8;
    }
    html.dark {
      --bg: #1A1A2E; --bg2: #16213E; --bg3: #1a2a1a;
      --card: #16213E; --border: #2A3A5E;
      --text: #E0E0E0; --text2: #A0A0B0; --text3: #6A6A8A;
      --primary: #B5C96B; --primary-dark: #9BAF5C;
      --shimmer1: #1e2a3e; --shimmer2: #243040;
    }

    body { background: var(--bg); color: var(--text); min-height: 100vh; }
    .card { background: var(--card); border-color: var(--border); }
    .bg-page { background: var(--bg); }
    .bg-page2 { background: var(--bg2); }
    .text-main { color: var(--text); }
    .text-sub { color: var(--text2); }
    .text-hint { color: var(--text3); }
    .border-main { border-color: var(--border); }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D4D4D4; border-radius: 9999px; }

    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes popIn { 0%{transform:scale(0.92);opacity:0} 100%{transform:scale(1);opacity:1} }

    .fade-in   { animation: fadeIn 0.4s ease both; }
    .fade-in-2 { animation: fadeIn 0.4s 0.1s ease both; }
    .fade-in-3 { animation: fadeIn 0.4s 0.2s ease both; }
    .shimmer   { background: linear-gradient(90deg,var(--shimmer1) 25%,var(--shimmer2) 50%,var(--shimmer1) 75%); background-size:400px 100%; animation:shimmer 1.4s infinite; }
    .spin      { animation: spin 1s linear infinite; }
    .pop-in    { animation: popIn 0.25s ease both; }

    .tag-active  { background: var(--primary); color: #2D2D2D; }
    .tag-default { background: var(--bg2); color: var(--text2); }
    .btn-primary { background: var(--primary); color: #2D2D2D; }
    .btn-primary:hover { background: var(--primary-dark); }
    .tab-active  { background: var(--text); color: var(--bg); }
    .tab-default { background: var(--bg2); color: var(--text2); }

    .card-hover { transition: box-shadow .2s, transform .2s; }
    .card-hover:hover { box-shadow: 0 8px 24px rgba(0,0,0,.12); transform: translateY(-2px); }
    .note-card-hover { transition: box-shadow .2s, transform .2s; }
    .note-card-hover:hover { box-shadow: 0 4px 16px rgba(0,0,0,.10); transform: translateY(-2px); }

    .day-line { border-left: 2px solid var(--primary); }
    .day-dot  { background: var(--primary); }

    .item-row { border-radius: 12px; }
    .item-row:hover { background: rgba(181,201,107,0.08); }
    .edit-btn { opacity: 0; transition: opacity .15s; }
    .item-row:hover .edit-btn { opacity: 1; }
    .editable-field { border: none; background: transparent; outline: none; width: 100%; color: var(--text); }
    .editable-field:focus { background: var(--card); border-radius: 6px; box-shadow: 0 0 0 2px rgba(181,201,107,0.4); padding: 2px 4px; }

    .flow-item { border-radius: 10px; font-size: 11px; }
    .flow-spot  { background: #E8EDC7; color: #4A6B1A; }
    .flow-food  { background: #FFF3D0; color: #9B6A00; }
    .flow-hotel { background: #EAF1FF; color: #1A4A99; }
    html.dark .flow-spot  { background: #2A3A1A; color: #A0C060; }
    html.dark .flow-food  { background: #3A3010; color: #C0A050; }
    html.dark .flow-hotel { background: #1A2A4A; color: #6090C0; }

    .modal-overlay { background: rgba(0,0,0,.5); backdrop-filter: blur(4px); }

    #toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(80px); background:#2D2D2D; color:#fff; padding:10px 20px; border-radius:9999px; font-size:14px; font-weight:500; z-index:9999; transition:transform .3s; pointer-events:none; }
    html.dark #toast { background: #B5C96B; color: #1A1A2E; }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Mobile bottom nav ── */
    #mobile-nav { display: none; }
    @media (max-width: 768px) {
      #mobile-nav { display: flex; }
      #desktop-tabs { display: none; }
      .result-grid { grid-template-columns: 1fr !important; }
      #flow-chart { flex-direction: column !important; align-items: stretch !important; }
      .flow-day { min-width: unset !important; width: 100% !important; }
      .flow-arrow { transform: rotate(90deg); text-align: center; margin: 4px 0; }
      .columns-2, .columns-3, .md\:columns-3 { columns: 1 !important; }
      .grid-cols-2, .grid-cols-3, .md\:grid-cols-2, .lg\:grid-cols-3 { grid-template-columns: 1fr !important; }
      #toast { bottom: 80px; }
    }

    /* dark mode input */
    html.dark input, html.dark textarea {
      background: var(--bg2);
      color: var(--text);
      border-color: var(--border);
    }
    html.dark .bg-white { background: var(--card) !important; }
    html.dark .bg-\[\#FAF7F2\] { background: var(--bg) !important; }
    html.dark .bg-\[\#F5F0E8\] { background: var(--bg2) !important; }
    html.dark .bg-\[\#F0EBE0\] { background: var(--bg2) !important; }
    html.dark .bg-\[\#E8EDC7\] { background: #2A3A1A !important; color: #A0C060 !important; }
    html.dark .text-\[\#2D2D2D\] { color: var(--text) !important; }
    html.dark .text-\[\#5A5A5A\] { color: var(--text2) !important; }
    html.dark .text-\[\#8A8A8A\] { color: var(--text3) !important; }
    html.dark .border-\[\#E5E5E5\] { border-color: var(--border) !important; }

    /* saved indicator */
    .save-dot { width:8px; height:8px; border-radius:50%; background:#22c55e; display:inline-block; }
    .save-dot.unsaved { background: #f59e0b; }
  </style>
</head>
<body>

<!-- Toast -->
<div id="toast">✅ 已保存</div>

<!-- ===== HEADER ===== -->
<header class="sticky top-0 z-50 border-b border-main" style="background:var(--bg);backdrop-filter:blur(12px)">
  <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between gap-3">
    <div class="flex items-center gap-2 shrink-0">
      <span class="text-2xl">✈️</span>
      <span class="font-bold text-xl tracking-tight">旅行家 <span style="color:var(--primary)">TripMate</span></span>
    </div>
    <div class="flex items-center gap-2">
      <!-- save indicator -->
      <div id="save-indicator" class="hidden items-center gap-1.5 text-xs text-hint">
        <span class="save-dot" id="save-dot"></span>
        <span id="save-label">已保存</span>
      </div>
      <!-- reset -->
      <button id="reset-btn" onclick="resetData()" class="hidden text-xs px-3 py-1.5 rounded-full border border-main text-sub hover:border-red-400 hover:text-red-500 transition-all">重置</button>
      <!-- dark mode toggle -->
      <button onclick="toggleDark()" id="dark-btn" class="w-9 h-9 rounded-full flex items-center justify-center text-lg hover:bg-page2 transition-all" title="切换暗色模式">🌙</button>
      <button class="btn-primary rounded-full px-4 py-2 text-sm font-semibold min-h-[36px]">登录</button>
    </div>
  </div>
</header>

<!-- ===== HERO ===== -->
<section id="hero" class="max-w-3xl mx-auto px-4 pt-16 pb-10 text-center">
  <div class="fade-in">
    <div class="inline-flex items-center gap-2 text-xs font-semibold px-4 py-1.5 rounded-full mb-6" style="background:var(--bg3);color:#6B8C2A">
      <span>🍀</span> 聚合小红书真实攻略，AI 智能规划行程
    </div>
    <h1 class="text-4xl md:text-5xl font-bold leading-tight mb-4">
      告别攻略焦虑<br /><span style="color:var(--primary)">一句话</span>搞定旅行规划
    </h1>
    <p class="text-sub text-lg mb-10">输入目的地或路线，AI 自动整合小红书优质笔记，生成专属行程</p>
  </div>
  <div class="fade-in-2 card rounded-2xl shadow-sm border p-4">
    <div class="flex items-center gap-3 mb-4">
      <div class="flex-1 flex items-center gap-2 rounded-xl px-4 py-3" style="background:var(--bg2)">
        <span class="text-lg">🗺️</span>
        <input id="dest-input" type="text" placeholder="输入目的地，如「大理」「成都」「三亚」"
          class="flex-1 bg-transparent text-sm outline-none" style="color:var(--text)" />
      </div>
      <button onclick="startPlan()" class="btn-primary rounded-xl px-5 py-3 font-semibold text-sm whitespace-nowrap flex items-center gap-2 min-h-[48px]">
        <span>🤖</span> AI 规划
      </button>
    </div>
    <div class="flex flex-wrap gap-2">
      <span class="text-xs text-hint self-center mr-1">天数</span>
      <button onclick="toggleTag(this)" class="tag-default text-xs px-3 py-1.5 rounded-full font-medium transition-all">3天</button>
      <button onclick="toggleTag(this)" class="tag-active  text-xs px-3 py-1.5 rounded-full font-medium transition-all">5天</button>
      <button onclick="toggleTag(this)" class="tag-default text-xs px-3 py-1.5 rounded-full font-medium transition-all">7天</button>
      <div class="w-px mx-1" style="background:var(--border)"></div>
      <span class="text-xs text-hint self-center mr-1">风格</span>
      <button onclick="toggleTag(this)" class="tag-active  text-xs px-3 py-1.5 rounded-full font-medium transition-all">🍜 美食</button>
      <button onclick="toggleTag(this)" class="tag-default text-xs px-3 py-1.5 rounded-full font-medium transition-all">📸 打卡</button>
      <button onclick="toggleTag(this)" class="tag-default text-xs px-3 py-1.5 rounded-full font-medium transition-all">🎒 穷游</button>
      <button onclick="toggleTag(this)" class="tag-default text-xs px-3 py-1.5 rounded-full font-medium transition-all">💑 情侣</button>
    </div>
  </div>
  <div class="fade-in-3 mt-6">
    <p class="text-xs text-hint mb-3">🔥 热门目的地</p>
    <div class="flex flex-wrap justify-center gap-2">
      <button onclick="quickSearch('大理')"  class="card border text-sm px-4 py-2 rounded-full hover:border-[#B5C96B] transition-all min-h-[40px]">🏔 大理</button>
      <button onclick="quickSearch('三亚')"  class="card border text-sm px-4 py-2 rounded-full hover:border-[#B5C96B] transition-all min-h-[40px]">🌊 三亚</button>
      <button onclick="quickSearch('成都')"  class="card border text-sm px-4 py-2 rounded-full hover:border-[#B5C96B] transition-all min-h-[40px]">🐼 成都</button>
      <button onclick="quickSearch('厦门')"  class="card border text-sm px-4 py-2 rounded-full hover:border-[#B5C96B] transition-all min-h-[40px]">🌅 厦门</button>
      <button onclick="quickSearch('西安')"  class="card border text-sm px-4 py-2 rounded-full hover:border-[#B5C96B] transition-all min-h-[40px]">🏯 西安</button>
      <button onclick="quickSearch('杭州')"  class="card border text-sm px-4 py-2 rounded-full hover:border-[#B5C96B] transition-all min-h-[40px]">🌸 杭州</button>
    </div>
  </div>
</section>

<!-- ===== LOADING ===== -->
<div id="loading" class="hidden max-w-6xl mx-auto px-4 py-8">
  <div class="text-center mb-8">
    <div class="inline-flex items-center gap-3 card rounded-2xl px-6 py-4 shadow-sm border">
      <div class="w-5 h-5 border-2 border-t-transparent rounded-full spin" style="border-color:var(--primary);border-top-color:transparent"></div>
      <span id="loading-text" class="text-sm font-medium text-sub">AI 正在抓取小红书笔记...</span>
    </div>
  </div>
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2 space-y-4">
      <div class="shimmer h-8 w-48 rounded-lg"></div>
      <div class="shimmer h-32 rounded-2xl"></div>
      <div class="shimmer h-32 rounded-2xl"></div>
    </div>
    <div class="space-y-4">
      <div class="shimmer h-8 w-32 rounded-lg"></div>
      <div class="shimmer h-48 rounded-2xl"></div>
    </div>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div id="result" class="hidden max-w-6xl mx-auto px-4 pb-28">
  <!-- Header -->
  <div class="fade-in flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
    <div>
      <h2 class="text-2xl font-bold" id="result-title">🗺 大理 5天4夜行程规划</h2>
      <p class="text-sm text-hint mt-1">基于 <span style="color:var(--primary)" class="font-semibold">47 篇</span>小红书笔记生成 · 预估花费 <span class="font-semibold" style="color:var(--text)">¥3500-5000/人</span></p>
    </div>
    <div class="flex flex-wrap gap-2">
      <button onclick="copyItinerary()" class="flex items-center gap-1.5 card border text-sm px-4 py-2 rounded-full font-medium hover:border-[#B5C96B] transition-all min-h-[40px]">📋 复制</button>
      <button onclick="exportPDF()" class="flex items-center gap-1.5 card border text-sm px-4 py-2 rounded-full font-medium hover:border-[#B5C96B] transition-all min-h-[40px]">📥 PDF</button>
      <button onclick="scrollToFlowChart()" class="flex items-center gap-1.5 card border text-sm px-4 py-2 rounded-full font-medium hover:border-[#B5C96B] transition-all min-h-[40px]">🗂 流程图</button>
    </div>
  </div>

  <!-- Desktop Tabs -->
  <div id="desktop-tabs" class="fade-in flex gap-2 mb-6 overflow-x-auto pb-1">
    <button onclick="switchTab('itinerary',this)" class="tab-active  whitespace-nowrap text-sm px-5 py-2 rounded-full font-semibold transition-all">📅 行程规划</button>
    <button onclick="switchTab('notes',this)"    class="tab-default whitespace-nowrap text-sm px-5 py-2 rounded-full font-semibold transition-all">📖 参考笔记</button>
    <button onclick="switchTab('hotel',this)"    class="tab-default whitespace-nowrap text-sm px-5 py-2 rounded-full font-semibold transition-all">🏨 住宿</button>
    <button onclick="switchTab('food',this)"     class="tab-default whitespace-nowrap text-sm px-5 py-2 rounded-full font-semibold transition-all">🍜 美食</button>
    <button onclick="switchTab('spot',this)"     class="tab-default whitespace-nowrap text-sm px-5 py-2 rounded-full font-semibold transition-all">🎯 景区</button>
  </div>

  <!-- TAB: Itinerary -->
  <div id="tab-itinerary">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 result-grid">
      <div class="lg:col-span-2 space-y-4 fade-in">
        <div class="flex items-center gap-2 text-xs text-hint rounded-xl px-4 py-2" style="background:rgba(181,201,107,0.15)">
          <span>✏️</span><span>点击任意时间/名称/描述可直接编辑；悬停显示更多操作</span>
        </div>
        <div id="days-container"></div>
        <button onclick="addDay()" class="w-full border-2 border-dashed rounded-2xl py-3 text-sm font-medium transition-all flex items-center justify-center gap-2 min-h-[48px]" style="border-color:#D0D8B0;color:var(--text3)" onmouseover="this.style.borderColor='#B5C96B';this.style.color='#6B8C2A'" onmouseout="this.style.borderColor='#D0D8B0';this.style.color='var(--text3)'">＋ 添加新的一天</button>
      </div>
      <div class="fade-in-2">
        <h3 class="font-semibold text-base mb-3">📖 参考笔记 <span class="text-xs text-hint font-normal">(小红书精选)</span></h3>
        <div id="notes-sidebar" class="space-y-3"></div>
      </div>
    </div>
    <!-- Flow Chart -->
    <div id="flow-chart-section" class="mt-10 fade-in">
      <div class="flex items-center gap-3 mb-4">
        <h3 class="text-xl font-bold">🗂 总行程流程图</h3>
        <span class="text-xs px-3 py-1 rounded-full font-semibold" style="background:var(--bg3);color:#6B8C2A">实时同步</span>
      </div>
      <div class="flex flex-wrap gap-3 mb-4 text-xs text-sub">
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-sm flow-spot inline-block"></span>景区</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-sm flow-food inline-block"></span>美食</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-sm flow-hotel inline-block"></span>住宿</span>
      </div>
      <div class="card rounded-2xl border p-6 overflow-x-auto">
        <div id="flow-chart" class="flex gap-0 items-start min-w-max"></div>
      </div>
      <div id="budget-summary" class="mt-4 grid grid-cols-2 md:grid-cols-4 gap-3"></div>
    </div>
  </div>

  <div id="tab-notes" class="hidden"><div id="notes-grid" class="columns-2 md:columns-3 gap-4 space-y-4"></div></div>
  <div id="tab-hotel" class="hidden"><div id="hotel-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div></div>
  <div id="tab-food"  class="hidden"><div id="food-grid"  class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div></div>
  <div id="tab-spot"  class="hidden"><div id="spot-grid"  class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div></div>
</div>

<!-- ===== MOBILE BOTTOM NAV ===== -->
<nav id="mobile-nav" class="fixed bottom-0 left-0 right-0 z-40 border-t border-main" style="background:var(--card)">
  <div class="flex items-center justify-around h-16 max-w-md mx-auto">
    <button onclick="switchTab('itinerary',null);setMobileNav(this)" class="mob-nav-btn flex flex-col items-center gap-1 text-[10px] font-medium py-2 px-4 rounded-xl transition-all active-nav" style="color:var(--primary)">
      <span class="text-xl">📅</span>行程
    </button>
    <button onclick="switchTab('notes',null);setMobileNav(this)" class="mob-nav-btn flex flex-col items-center gap-1 text-[10px] font-medium py-2 px-4 rounded-xl transition-all" style="color:var(--text3)">
      <span class="text-xl">📖</span>笔记
    </button>
    <button onclick="switchTab('hotel',null);setMobileNav(this)" class="mob-nav-btn flex flex-col items-center gap-1 text-[10px] font-medium py-2 px-4 rounded-xl transition-all" style="color:var(--text3)">
      <span class="text-xl">🏨</span>住宿
    </button>
    <button onclick="switchTab('food',null);setMobileNav(this)" class="mob-nav-btn flex flex-col items-center gap-1 text-[10px] font-medium py-2 px-4 rounded-xl transition-all" style="color:var(--text3)">
      <span class="text-xl">🍜</span>美食
    </button>
    <button onclick="switchTab('spot',null);setMobileNav(this)" class="mob-nav-btn flex flex-col items-center gap-1 text-[10px] font-medium py-2 px-4 rounded-xl transition-all" style="color:var(--text3)">
      <span class="text-xl">🎯</span>景区
    </button>
  </div>
</nav>

<!-- ===== EDIT MODAL ===== -->
<div id="edit-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay px-4">
  <div class="card rounded-2xl shadow-2xl w-full max-w-md pop-in border">
    <div class="flex items-center justify-between px-6 py-4 border-b border-main">
      <h4 class="font-bold text-base">✏️ 编辑行程项目</h4>
      <button onclick="closeModal()" class="text-hint hover:text-main text-xl w-8 h-8 flex items-center justify-center">✕</button>
    </div>
    <div class="p-6 space-y-4">
      <div><label class="text-xs font-semibold text-sub mb-1 block">时间</label>
        <input id="m-time" type="text" class="w-full border border-main rounded-xl px-4 py-2.5 text-sm outline-none focus:border-[#B5C96B]" /></div>
      <div><label class="text-xs font-semibold text-sub mb-1 block">名称</label>
        <input id="m-name" type="text" class="w-full border border-main rounded-xl px-4 py-2.5 text-sm outline-none focus:border-[#B5C96B]" /></div>
      <div><label class="text-xs font-semibold text-sub mb-1 block">描述</label>
        <textarea id="m-desc" rows="2" class="w-full border border-main rounded-xl px-4 py-2.5 text-sm outline-none resize-none focus:border-[#B5C96B]"></textarea></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs font-semibold text-sub mb-1 block">预算</label>
          <input id="m-price" type="text" class="w-full border border-main rounded-xl px-4 py-2.5 text-sm outline-none focus:border-[#B5C96B]" /></div>
        <div><label class="text-xs font-semibold text-sub mb-1 block">时长</label>
          <input id="m-duration" type="text" class="w-full border border-main rounded-xl px-4 py-2.5 text-sm outline-none focus:border-[#B5C96B]" /></div>
      </div>
      <div><label class="text-xs font-semibold text-sub mb-1 block">类型</label>
        <div class="flex gap-2">

// ============================
// STATE
// ============================
let currentData = null;
let currentDest = '';
let editTarget  = null;
let modalType   = 'spot';
const SAVE_KEY  = 'tripmate_data';

// ============================
// DARK MODE
// ============================
function initDark() {
  const saved = localStorage.getItem('tripmate_dark');
  if (saved === 'dark') applyDark(true);
}
function applyDark(on) {
  document.documentElement.classList.toggle('dark', on);
  document.getElementById('dark-btn').textContent = on ? '☀️' : '🌙';
  localStorage.setItem('tripmate_dark', on ? 'dark' : 'light');
}
function toggleDark() {
  applyDark(!document.documentElement.classList.contains('dark'));
}
initDark();

// ============================
// LOCAL SAVE
// ============================
function saveToLocal() {
  if (!currentData || !currentDest) return;
  localStorage.setItem(SAVE_KEY, JSON.stringify({ dest: currentDest, data: currentData }));
  setSaveIndicator(true);
}
function loadFromLocal() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return false;
  try {
    const { dest, data } = JSON.parse(raw);
    currentDest = dest;
    currentData = data;
    return true;
  } catch(e) { return false; }
}
function resetData() {
  if (!confirm('确认重置为默认行程？所有编辑将丢失。')) return;
  if (!currentDest || !defaultData[currentDest]) return;
  currentData = JSON.parse(JSON.stringify(defaultData[currentDest]));
  localStorage.removeItem(SAVE_KEY);
  renderAll();
  setSaveIndicator(false);
  showToast('🔄 已重置为默认行程');
}
function setSaveIndicator(saved) {
  const ind = document.getElementById('save-indicator');
  const dot = document.getElementById('save-dot');
  const lbl = document.getElementById('save-label');
  ind.classList.remove('hidden');
  ind.style.display = 'flex';
  dot.className = 'save-dot' + (saved ? '' : ' unsaved');
  lbl.textContent = saved ? '已保存' : '未保存';
  document.getElementById('reset-btn').classList.remove('hidden');
}

// ============================
// HELPERS
// ============================
function toggleTag(el) {
  el.classList.toggle('tag-active');
  el.classList.toggle('tag-default');
}
function quickSearch(dest) {
  document.getElementById('dest-input').value = dest;
  startPlan();
}
function typeColor(type) {
  return {spot:'flow-spot',food:'flow-food',hotel:'flow-hotel'}[type] || 'flow-spot';
}
function typeBadge(type) {
  const map = {
    spot:'bg-[#E8EDC7] text-[#4A6B1A]',
    food:'bg-[#FFF3D0] text-[#9B6A00]',
    hotel:'bg-[#EAF1FF] text-[#1A4A99]'
  };
  return map[type] || map.spot;
}
function showToast(msg='✅ 已保存') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function findDest(input) {
  const keys = Object.keys(defaultData);
  return keys.find(k => input.includes(k)) || '大理';
}

// ============================
// 小红书真实数据抓取（本地 OpenCLI）
// ============================
async function fetchXhsNotes(dest) {
  // OpenCLI 本地 daemon 默认跑在 19825 端口
  // 通过 http://localhost:19825 发搜索请求
  try {
    const query = `${dest}旅行攻略`;
    const url = `http://localhost:19826/?q=${encodeURIComponent(query)}`;
    const resp = await fetch(url, { signal: AbortSignal.timeout(15000) });
    if (!resp.ok) throw new Error('proxy error');
    const data = await resp.json();
    // 解析返回的笔记列表
    const items = Array.isArray(data) ? data : (data.results || data.items || []);
    if (!items.length) throw new Error('empty');
    return items.slice(0, 8).map(n => ({
      cover: n.cover || n.image || n.thumbnail || `https://picsum.photos/seed/${dest}${Math.random()|0}/300/400`,
      title: n.title || n.name || '旅行攻略',
      author: n.author || n.nickname || '旅行达人',
      likes: n.likes || n.liked_count || n.interact_info?.liked_count || '热门',
      url: n.url || n.link || '#'
    }));
  } catch(e) {
    console.log('OpenCLI 未连接，使用本地数据:', e.message);
    return null; // 降级用假数据
  }
}

function startPlan() {
  const input = document.getElementById('dest-input').value.trim() || '大理';
  currentDest = findDest(input);
  currentData = JSON.parse(JSON.stringify(defaultData[currentDest]));

  document.getElementById('hero').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('loading').classList.remove('hidden');

  let i = 0;
  const el = document.getElementById('loading-text');
  const iv = setInterval(() => { el.textContent = loadingMessages[++i % loadingMessages.length]; }, 800);

  // 同时抓取真实小红书数据
  fetchXhsNotes(currentDest).then(realNotes => {
    clearInterval(iv);
    // 如果拿到了真实数据，替换掉假数据
    if (realNotes && realNotes.length > 0) {
      currentData.notes = realNotes;
      el.textContent = `✅ 已抓取 ${realNotes.length} 篇真实小红书笔记！`;
    }
    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result-title').textContent = `${defaultData[currentDest].emoji} ${currentDest} ${currentData.days.length}天${currentData.days.length-1}夜行程规划`;
      renderAll();
      document.getElementById('result').classList.remove('hidden');
      document.getElementById('mobile-nav').style.display = 'flex';
      switchTab('itinerary', document.querySelector('[onclick^="switchTab(\'itinerary\'"]'));
      setSaveIndicator(false);
    }, realNotes ? 800 : 3000);
  });
}

function updateField(di, ii, field, val) {
  currentData.days[di].items[ii][field] = val;
  renderFlowChart();
  saveToLocal();
}
function updateDayTitle(di, val) {
  currentData.days[di].title = val;
  renderFlowChart();
  saveToLocal();
}
function moveItem(di, ii, dir) {
  const items = currentData.days[di].items;
  const ni = ii + dir;
  if (ni < 0 || ni >= items.length) return;
  [items[ii], items[ni]] = [items[ni], items[ii]];
  renderDays(); renderFlowChart();
  showToast('↕️ 顺序已更新');
  saveToLocal();
}
function removeDay(di) {
  if (currentData.days.length <= 1) { showToast('⚠️ 至少保留一天'); return; }
  currentData.days.splice(di, 1);
  currentData.days.forEach((d, i) => d.day = i + 1);
  renderDays(); renderFlowChart(); renderBudget();
  showToast('🗑 已删除该天');
  saveToLocal();
}
function addDay() {
  const last = currentData.days[currentData.days.length - 1];
  currentData.days.push({ day: last.day + 1, title: `第${last.day + 1}天`, items: [
    { time: '09:00', type: 'spot', icon: '📍', name: '新景点', desc: '点击编辑内容', duration: '2h', price: '待定' }
  ]});
  renderDays(); renderFlowChart(); renderBudget();
  showToast('✅ 已添加新的一天');
  saveToLocal();
}
function addItem(di) {

function openModal(di, ii) {
  editTarget = { di, ii };
  const item = currentData.days[di].items[ii];
  document.getElementById('m-time').value     = item.time;
  document.getElementById('m-name').value     = item.name;
  document.getElementById('m-desc').value     = item.desc;
  document.getElementById('m-price').value    = item.price;
  document.getElementById('m-duration').value = item.duration;
  setModalType(item.type);
  document.getElementById('edit-modal').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('edit-modal').classList.add('hidden');
  editTarget = null;
}
function setModalType(type) {
  modalType = type;
  document.querySelectorAll('.type-btn').forEach(btn => {
    const t = btn.dataset.type;
    btn.className = `type-btn flex-1 text-xs px-3 py-2 rounded-xl border font-medium transition-all ${t === type ? typeColor(t)+' border-[#B5C96B] ring-2 ring-[#B5C96B]/30' : 'border-main'}`;
    if (t !== type) { btn.style.background = 'var(--bg2)'; btn.style.color = 'var(--text2)'; }
    else { btn.style.background = ''; btn.style.color = ''; }
  });
}
function saveModal() {
  if (!editTarget) return;
  const { di, ii } = editTarget;
  const item = currentData.days[di].items[ii];
  item.time     = document.getElementById('m-time').value;
  item.name     = document.getElementById('m-name').value;
  item.desc     = document.getElementById('m-desc').value;
  item.price    = document.getElementById('m-price').value;
  item.duration = document.getElementById('m-duration').value;
  item.type     = modalType;
  closeModal();
  renderDays(); renderFlowChart();
  showToast('✅ 已保存修改');
  saveToLocal();
}
function deleteItem() {
  if (!editTarget) return;
  const { di, ii } = editTarget;
  currentData.days[di].items.splice(ii, 1);
  closeModal();
  renderDays(); renderFlowChart();
  showToast('🗑 已删除该项目');
  saveToLocal();
}
document.getElementById('edit-modal').addEventListener('click', e => {

function copyItinerary() {
  const text = currentData.days.map(d =>
    `【Day${d.day}·${d.title}】\n` +
    d.items.map(i => `${i.time} ${i.icon}${i.name} — ${i.desc}（${i.price}）`).join('\n')
  ).join('\n\n');
  navigator.clipboard.writeText(text).then(() => showToast('📋 行程已复制到剪贴板'));
}

function exportPDF() {
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    // Title
    doc.setFontSize(18);
    doc.setTextColor(45, 45, 45);
    doc.text(`${currentDest} 旅行规划`, 20, 20);

    doc.setFontSize(10);
    doc.setTextColor(130, 130, 130);
    doc.text(`由 TripMate 生成 · 预估花费 ${defaultData[currentDest]?.budget || ''}`, 20, 28);

    let y = 40;
    currentData.days.forEach(d => {
      if (y > 260) { doc.addPage(); y = 20; }

      doc.setFontSize(13);
      doc.setTextColor(45, 45, 45);
      doc.text(`Day ${d.day}  ${d.title}`, 20, y);
      y += 7;

      d.items.forEach(item => {
        if (y > 270) { doc.addPage(); y = 20; }
        doc.setFontSize(10);
        doc.setTextColor(80, 80, 80);
        doc.text(`  ${item.time}  ${item.name}  ${item.price}`, 20, y);
        y += 5;
        if (item.desc) {
          doc.setFontSize(9);
          doc.setTextColor(120, 120, 120);
          const lines = doc.splitTextToSize(`         ${item.desc}`, 170);
          doc.text(lines, 20, y);
          y += lines.length * 4.5;
        }
        y += 1;
      });
      y += 5;
    });

    doc.save(`${currentDest}旅行规划_TripMate.pdf`);
    showToast('📥 PDF 已下载');
  } catch(e) {
    showToast('⚠️ PDF 生成失败，请稍后重试');
    console.error(e);
  }
}

// ============================
// TABS
// ============================
function scrollToFlowChart() {
  document.getElementById('flow-chart-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function switchTab(tab, el) {
  ['itinerary','notes','hotel','food','spot'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
  document.getElementById('tab-'+tab).classList.remove('hidden');
  document.querySelectorAll('[onclick^="switchTab"]').forEach(b => {
    b.classList.remove('tab-active'); b.classList.add('tab-default');
  });
  if (el) { el.classList.remove('tab-default'); el.classList.add('tab-active'); }
}

function setMobileNav(el) {
  document.querySelectorAll('.mob-nav-btn').forEach(b => b.style.color = 'var(--text3)');
  el.style.color = 'var(--primary)';
}
</script>
